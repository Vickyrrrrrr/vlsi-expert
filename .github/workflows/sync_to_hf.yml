name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'vxkyyy' and 'vlsi-expert' with your actual HF username and space name if different
          git remote add hf https://vxkyyy:$HF_TOKEN@huggingface.co/spaces/vxkyyy/vlsi-expert
          git push --force hf main
